# Pre-commit hooks configuration for contextual_rag project
# Install: uv add pre-commit --dev && uv run pre-commit install
# Setup pre-push: uv run pre-commit install --hook-type pre-push
# Run manually: uv run pre-commit run --all-files
# VPS: /home/admin/.local/pre-commit-venv/bin/pre-commit run --all-files
#
# Documentation: https://pre-commit.com/

default_language_version:
  python: python3.12  # Updated to match installed Python version

# Install both pre-commit and pre-push hooks by default
default_install_hook_types:
  - pre-commit
  - pre-push

# Default stages for hooks (can be overridden per hook)
default_stages:
  - pre-commit

fail_fast: true  # Stop on first failure (performance)

repos:
  # Ruff - Modern Python linter and formatter (replaces flake8, black, isort)
  # Best Practice 2025: Run linter BEFORE formatter (lint → format order)
  # Documentation: https://docs.astral.sh/ruff/integrations/
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7  # Latest: https://github.com/astral-sh/ruff-pre-commit/releases
    hooks:
      # Step 1: Linter - checks code quality (runs FIRST)
      - id: ruff-check
        name: Ruff Linter (check + fix)
        args:
          - --fix           # Auto-fix issues when possible
          - --exit-non-zero-on-fix  # Fail if fixes were applied (to review changes)
        types_or: [python, pyi]
        exclude: ^legacy/

      # Step 2: Formatter - formats code (runs AFTER linting)
      - id: ruff-format
        name: Ruff Formatter
        types_or: [python, pyi]
        exclude: ^legacy/

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # Latest: https://github.com/pre-commit/pre-commit-hooks/releases
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-toml
        name: Check TOML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: debug-statements
        name: Check for debugger imports
      - id: mixed-line-ending
        name: Check mixed line endings
        args: ['--fix=lf']

  # Optional: mypy for type checking
  # Uncomment to enable strict type checking
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.13.0
  #   hooks:
  #     - id: mypy
  #       name: MyPy Type Checker
  #       additional_dependencies:
  #         - types-requests
  #         - types-aiohttp
  #       args:
  #         - --config-file=pyproject.toml

  # Optional: bandit for security issues
  # Uncomment to enable security scanning
  # - repo: https://github.com/PyCQA/bandit
  #   rev: '1.7.10'
  #   hooks:
  #     - id: bandit
  #       name: Bandit Security Linter
  #       args:
  #         - -c
  #         - pyproject.toml
  #       additional_dependencies: ["bandit[toml]"]

  # =============================================================================
  # PRE-PUSH HOOKS (Run before git push)
  # =============================================================================
  # These hooks run more expensive checks that shouldn't slow down commits

  # Run tests before push (if you have tests)
  # Uncomment when tests are available
  # - repo: local
  #   hooks:
  #     - id: pytest
  #       name: Run pytest
  #       entry: pytest
  #       language: system
  #       pass_filenames: false
  #       stages: [pre-push]

  # Block direct commits to main — only merge from dev allowed.
  # git merge doesn't trigger pre-commit stage, so merges pass through.
  - repo: local
    hooks:
      - id: no-commit-to-main
        name: Block direct commits to main
        entry: ./scripts/no-commit-to-main.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
