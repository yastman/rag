# Base configuration — all services, no ports exposed.
# Use with override: COMPOSE_FILE=compose.yml:compose.dev.yml
# See docs/plans/2026-03-05-docker-compose-unification-design.md

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security-defaults: &security-defaults
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  read_only: true
  tmpfs:
    - /tmp

services:
  # =============================================================================
  # DATABASES
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy volatile-lfu
      --maxmemory-samples 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  qdrant:
    image: qdrant/qdrant:v1.17.0@sha256:f1c7272cdac52b38c1a0e89313922d940ba50afd90d593a1605dbbc214e66ffb
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'set -euo pipefail; exec 3<>/dev/tcp/localhost/6333; echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r line <&3; [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # AI SERVICES
  # =============================================================================

  bge-m3:
    <<: *security-defaults
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      MODEL_CACHE_DIR: /models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
          pids: 200

  user-base:
    <<: *security-defaults
    build:
      context: ./services/user-base
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100

  docling:
    <<: *security-defaults
    build:
      context: ./services/docling
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    read_only: false
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
      DOCLING_BACKEND: docling
      DOCLING_PDF_BACKEND: dlparse_v2
      DOCLING_TABLE_MODE: accurate
    volumes:
      - ./data/docling:/data
      - docling_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 200

  # =============================================================================
  # LLM GATEWAY
  # =============================================================================

  litellm:
    <<: *security-defaults
    # LiteLLM writes migration/UI artifacts under site-packages at startup.
    # Keep hardening defaults, but allow writes for this service.
    read_only: false
    image: ghcr.io/berriai/litellm:main-v1.81.3-stable@sha256:3d80908e35230a0dfb58051ae4e2847371b2a327b44e105e79b8c4f67a65596c
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    environment:
      # Auth
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      # LLM Providers
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-${LLM_API_KEY}}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Langfuse v3 OTEL (Docker internal network)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_OTEL_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      # Database for virtual keys
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/litellm
    command: ["--config", "/app/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 100

  # =============================================================================
  # TELEGRAM BOT
  # =============================================================================

  bot:
    <<: *security-defaults
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      # Local embeddings (matches VPS production)
      RETRIEVAL_DENSE_PROVIDER: bge_m3_api
      RETRIEVAL_SPARSE_PROVIDER: bge_m3_api
      BGE_M3_URL: http://bge-m3:8000
      BGE_M3_TIMEOUT: "${BGE_M3_TIMEOUT:-120}"
      GENERATE_MAX_TOKENS: "${GENERATE_MAX_TOKENS:-2048}"
      RERANK_CANDIDATES_MAX: "${RERANK_CANDIDATES_MAX:-10}"
      # Semantic cache
      USE_LOCAL_EMBEDDINGS: "true"
      USER_BASE_URL: http://user-base:8000
      # Services
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      # LLM (via LiteLLM Proxy)
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      # Latency knobs
      MAX_REWRITE_ATTEMPTS: "${MAX_REWRITE_ATTEMPTS:-1}"
      REWRITE_MAX_TOKENS: "${REWRITE_MAX_TOKENS:-64}"
      # Pipeline mode
      CLIENT_DIRECT_PIPELINE_ENABLED: "${CLIENT_DIRECT_PIPELINE_ENABLED:-false}"
      # Domain configuration
      BOT_DOMAIN: ${BOT_DOMAIN:-недвижимость}
      BOT_LANGUAGE: ${BOT_LANGUAGE:-ru}
      # Langfuse observability (optional — bot degrades gracefully)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_TRACING_ENVIRONMENT: "${LANGFUSE_TRACING_ENVIRONMENT:-}"
      LANGFUSE_FLUSH_AT: "${LANGFUSE_FLUSH_AT:-512}"
      LANGFUSE_FLUSH_INTERVAL: "${LANGFUSE_FLUSH_INTERVAL:-5.0}"
      LANGFUSE_PROMPT_LABEL: "${LANGFUSE_PROMPT_LABEL:-production}"
      # CRM — Kommo integration
      KOMMO_ENABLED: "${KOMMO_ENABLED:-false}"
      KOMMO_SUBDOMAIN: "${KOMMO_SUBDOMAIN:-}"
      KOMMO_ACCESS_TOKEN: "${KOMMO_ACCESS_TOKEN:-}"
      KOMMO_CLIENT_ID: "${KOMMO_CLIENT_ID:-}"
      KOMMO_CLIENT_SECRET: "${KOMMO_CLIENT_SECRET:-}"
      KOMMO_REDIRECT_URI: "${KOMMO_REDIRECT_URI:-}"
      KOMMO_TELEGRAM_FIELD_ID: "${KOMMO_TELEGRAM_FIELD_ID:-0}"
      KOMMO_DEFAULT_PIPELINE_ID: "${KOMMO_DEFAULT_PIPELINE_ID:-0}"
      KOMMO_RESPONSIBLE_USER_ID: "${KOMMO_RESPONSIBLE_USER_ID:-0}"
      KOMMO_SESSION_FIELD_ID: "${KOMMO_SESSION_FIELD_ID:-0}"
      KOMMO_LEAD_SCORE_FIELD_ID: "${KOMMO_LEAD_SCORE_FIELD_ID:-0}"
      KOMMO_LEAD_BAND_FIELD_ID: "${KOMMO_LEAD_BAND_FIELD_ID:-0}"
      KOMMO_NEW_STATUS_ID: "${KOMMO_NEW_STATUS_ID:-0}"
      KOMMO_SERVICE_FIELD_ID: "${KOMMO_SERVICE_FIELD_ID:-0}"
      KOMMO_SOURCE_FIELD_ID: "${KOMMO_SOURCE_FIELD_ID:-0}"
      KOMMO_TELEGRAM_USERNAME_FIELD_ID: "${KOMMO_TELEGRAM_USERNAME_FIELD_ID:-0}"
      # Manager
      MANAGER_IDS: "${MANAGER_IDS:-}"
      MANAGER_HOT_LEAD_THRESHOLD: "${MANAGER_HOT_LEAD_THRESHOLD:-60}"
      MANAGER_HOT_LEAD_DEDUPE_SEC: "${MANAGER_HOT_LEAD_DEDUPE_SEC:-3600}"
      # Real Estate DB
      REALESTATE_DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/realestate"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      user-base:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 100

  # =============================================================================
  # MINI APP (Telegram Web App — FastAPI + React/nginx)
  # =============================================================================

  mini-app-api:
    <<: *security-defaults
    build:
      context: .
      dockerfile: mini_app/Dockerfile
    profiles: ["bot", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      BGE_M3_URL: http://bge-m3:8000
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      REALESTATE_DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/realestate"
      KOMMO_ENABLED: "${KOMMO_ENABLED:-false}"
      KOMMO_SUBDOMAIN: "${KOMMO_SUBDOMAIN:-}"
      KOMMO_ACCESS_TOKEN: "${KOMMO_ACCESS_TOKEN:-}"
      BOT_USERNAME: "${BOT_USERNAME:-}"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  mini-app-frontend:
    build:
      context: ./mini_app/frontend
      dockerfile: Dockerfile
    profiles: ["bot", "full"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mini-app-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

  # =============================================================================
  # UNIFIED INGESTION PIPELINE (v3.2.1)
  # =============================================================================

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    profiles: ["ingest", "full"]
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    environment:
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - GDRIVE_SYNC_DIR=/data/drive-sync
      - INGESTION_DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/cocoindex
      - QDRANT_URL=http://qdrant:6333
      - DOCLING_URL=http://docling:5001
      - GDRIVE_COLLECTION_NAME=gdrive_documents_bge
      # Local embeddings (matches VPS production)
      - USE_LOCAL_DENSE_EMBEDDINGS=true
      - BGE_M3_URL=http://bge-m3:8000
      - BGE_M3_TIMEOUT=600
      - BGE_M3_CONCURRENCY=1
      - MANIFEST_DIR=/data/manifest
    volumes:
      - ${GDRIVE_SYNC_DIR:-~/drive-sync}:/data/drive-sync:ro
      - ingestion-manifest:/data/manifest
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # ML PLATFORM (Langfuse stack — always-on on VPS, profile-gated on dev via override)
  # =============================================================================

  # ClickHouse for Langfuse v3 analytics
  clickhouse:
    image: clickhouse/clickhouse-server:26.1@sha256:7f6546e5e293cfcdb812675fde424dc9bce3d32ac86f18051fedc23bff75a724
    restart: unless-stopped
    logging: *default-logging
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1536M

  # MinIO S3-compatible storage for Langfuse v3
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z@sha256:1dce27c494a16bae114774f1cec295493f3613142713130c2d22dd5696be6ad3
    restart: unless-stopped
    logging: *default-logging
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # Redis for Langfuse v3 (separate from app Redis)
  redis-langfuse:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD:-langfuseredis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD:-langfuseredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # Langfuse v3 Worker
  langfuse-worker:
    image: langfuse/langfuse-worker:3.150.0@sha256:e4c98263d86593e2ba76e104c7e62e1c0c306785b84d83e21f74ef9f2d9bd0c9
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment: &langfuse-env
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/langfuse
      # Auth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      SALT: ${SALT:?SALT is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      # ClickHouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # S3/MinIO
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      # Redis
      REDIS_HOST: redis-langfuse
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-langfuseredis}
      # Telemetry
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  # Langfuse v3 Web
  langfuse:
    image: langfuse/langfuse:3.150.0@sha256:7f47fd823a5d6f8b1195e0ca6830f8f99e78a659b150ccdb077d188674efb1b6
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-worker:
        condition: service_started
    environment:
      <<: *langfuse-env
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1024M

  # =============================================================================
  # ML PLATFORM (dev-only services — profile-gated, not started on VPS)
  # =============================================================================

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    profiles: ["eval", "ml", "full"]
    restart: unless-stopped
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: >
      mlflow server
      --backend-store-uri postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # MONITORING & ALERTING (dev-only)
  # =============================================================================

  loki:
    image: grafana/loki:3.6.7@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    profiles: ["obs", "full"]
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki.yaml:/etc/loki/local-config.yaml:ro
      - ./docker/monitoring/rules:/etc/loki/rules/fake:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.6.7@sha256:51346af8682f7a664affaca4f34a62f5a4f0f83ace9931df94590375a94ff8f1
    profiles: ["obs", "full"]
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/promtail", "--version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  alertmanager:
    image: prom/alertmanager:v0.31.1@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1
    profiles: ["obs", "full"]
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/alertmanager.yaml:/etc/alertmanager/alertmanager.tmpl:ro
      - alertmanager_data:/alertmanager
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Check if Telegram bot token is configured
        if [ -z "$${TELEGRAM_ALERTING_BOT_TOKEN}" ]; then
          echo "WARNING: TELEGRAM_ALERTING_BOT_TOKEN not set, using null receiver"
          # Create minimal config with null receiver
          cat > /etc/alertmanager/alertmanager.yml << 'NULLCONFIG'
        global:
          resolve_timeout: 5m
        route:
          receiver: 'null'
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        receivers:
          - name: 'null'
        NULLCONFIG
        else
          # Substitute environment variables in config template
          cat /etc/alertmanager/alertmanager.tmpl | \
            sed "s|\$${TELEGRAM_ALERTING_BOT_TOKEN}|$${TELEGRAM_ALERTING_BOT_TOKEN}|g" | \
            sed "s|\$${TELEGRAM_ALERTING_CHAT_ID}|$${TELEGRAM_ALERTING_CHAT_ID}|g" \
            > /etc/alertmanager/alertmanager.yml
        fi
        # Start alertmanager
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=http://localhost:9093
    environment:
      TELEGRAM_ALERTING_BOT_TOKEN: ${TELEGRAM_ALERTING_BOT_TOKEN:-}
      TELEGRAM_ALERTING_CHAT_ID: ${TELEGRAM_ALERTING_CHAT_ID:-0}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =============================================================================
  # VOICE (dev-only — LiveKit Agents + SIP)
  # =============================================================================

  rag-api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      BGE_M3_URL: http://bge-m3:8000
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      RERANK_PROVIDER: colbert
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  livekit-server:
    image: livekit/livekit-server:v1.9@sha256:289262ffae8b827f45186331aa315d08ed275eb30f9b0add337ec57948e44ca1
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./docker/livekit:/etc/livekit:ro
    command: --config /etc/livekit/livekit.yaml --dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  livekit-sip:
    image: livekit/sip:latest@sha256:96ef59d461e692c43c77bfe2caa8b469e662e2cc1158082e3af5434184225897
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_WS_URL: ws://livekit-server:7880
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret}
        ws_url: ws://livekit-server:7880
        redis:
          address: redis:6379
          password: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: false
        log_level: info
      SIP_PORT: "5060"
      RTP_PORT_LOW: "10000"
      RTP_PORT_HIGH: "10100"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x livekit-sip || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      livekit-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  voice-agent:
    build:
      context: .
      dockerfile: src/voice/Dockerfile
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      LIVEKIT_URL: ws://livekit-server:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      ELEVEN_API_KEY: ${ELEVENLABS_API_KEY:-}
      RAG_API_URL: http://rag-api:8080
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/postgres
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      livekit-server:
        condition: service_healthy
      rag-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
  docling_cache:
  mlflow_artifacts:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  ingestion-manifest:
  loki_data:
  alertmanager_data:
