apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4o-mini
        litellm_params:
          model: cerebras/zai-glm-4.7
          api_key: os.environ/CEREBRAS_API_KEY
          max_completion_tokens: 1024
          disable_reasoning: true
      - model_name: gpt-oss-120b
        litellm_params:
          model: cerebras/gpt-oss-120b
          api_key: os.environ/CEREBRAS_API_KEY
          max_completion_tokens: 1024
          merge_reasoning_content_in_choices: true
      - model_name: gpt-4o-mini-cerebras-glm
        litellm_params:
          model: cerebras/zai-glm-4.7
          api_key: os.environ/CEREBRAS_API_KEY
          max_completion_tokens: 1024
      - model_name: gpt-4o-mini-fallback
        litellm_params:
          model: groq/llama-3.1-70b-versatile
          api_key: os.environ/GROQ_API_KEY
      - model_name: gpt-4o-mini-openai
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: os.environ/OPENAI_API_KEY
      # Speech-to-text: Whisper via OpenAI
      - model_name: whisper
        litellm_params:
          model: whisper-1
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          mode: audio_transcription
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      proxy_batch_write_at: 60
      disable_error_logs: true
      allow_requests_on_db_unavailable: true
    router_settings:
      retry_policy:
        retry_count: 2
    litellm_settings:
      request_timeout: 600
      set_verbose: false
      json_logs: true
      drop_params: true
      fallbacks:
        - gpt-4o-mini: [gpt-4o-mini-cerebras-glm, gpt-4o-mini-fallback, gpt-4o-mini-openai]
        - gpt-oss-120b: [gpt-4o-mini-cerebras-glm, gpt-4o-mini-fallback, gpt-4o-mini-openai]
