apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: docling
  template:
    metadata:
      labels:
        app: docling
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docling
          image: ghcr.io/yastman/rag-docling:v2.14.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5001
          env:
            - name: UVICORN_HOST
              value: "0.0.0.0"
            - name: UVICORN_PORT
              value: "5001"
            - name: DOCLING_BACKEND
              value: docling
            - name: DOCLING_PDF_BACKEND
              value: dlparse_v2
            - name: DOCLING_TABLE_MODE
              value: accurate
          volumeMounts:
            - name: cache
              mountPath: /app/.cache/huggingface
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 5001
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: docling-cache
