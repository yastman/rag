# VPS Stack - Local embeddings, no Voyage API dependency
# Start: docker compose --compatibility -f docker-compose.vps.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security-defaults: &security-defaults
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  read_only: true
  tmpfs:
    - /tmp

services:
  # =============================================================================
  # DATABASES
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    container_name: vps-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    container_name: vps-redis
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy volatile-lfu
      --maxmemory-samples 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  qdrant:
    image: qdrant/qdrant:v1.17.0@sha256:f1c7272cdac52b38c1a0e89313922d940ba50afd90d593a1605dbbc214e66ffb
    container_name: vps-qdrant
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # qdrant/qdrant image doesn't include curl/wget; use bash + /dev/tcp to hit /readyz.
      # NOTE: docker-compose interpolates `$VAR`; use `$$` to pass literal `$` into the container.
      test: ["CMD-SHELL", "bash -c 'set -euo pipefail; exec 3<>/dev/tcp/localhost/6333; echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r line <&3; [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # DOCUMENT PROCESSING
  # =============================================================================

  docling:
    <<: *security-defaults
    build:
      context: ./services/docling
      dockerfile: Dockerfile
    container_name: vps-docling
    # Docling needs write access for temp processing files
    read_only: false
    restart: unless-stopped
    logging: *default-logging
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
      DOCLING_BACKEND: docling
      DOCLING_PDF_BACKEND: dlparse_v2
      DOCLING_TABLE_MODE: accurate
    volumes:
      - ./data/docling:/data
      - docling_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  # =============================================================================
  # ML SERVICES (Local embeddings)
  # =============================================================================

  bge-m3:
    <<: *security-defaults
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    container_name: vps-bge-m3
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      OMP_NUM_THREADS: 2
      MKL_NUM_THREADS: 2
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

  user-base:
    <<: *security-defaults
    build:
      context: ./services/user-base
      dockerfile: Dockerfile
    container_name: vps-user-base
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  # =============================================================================
  # LLM GATEWAY
  # =============================================================================

  litellm:
    <<: *security-defaults
    # LiteLLM writes migration/UI artifacts under site-packages at startup.
    read_only: false
    image: ghcr.io/berriai/litellm:main-v1.81.3-stable@sha256:3d80908e35230a0dfb58051ae4e2847371b2a327b44e105e79b8c4f67a65596c
    container_name: vps-litellm
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_OTEL_HOST: ${LANGFUSE_HOST:-}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/litellm
    command: ["--config", "/app/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # TELEGRAM BOT
  # =============================================================================

  bot:
    <<: *security-defaults
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: vps-bot
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      # Local embeddings (no Voyage API needed)
      RETRIEVAL_DENSE_PROVIDER: bge_m3_api
      RETRIEVAL_SPARSE_PROVIDER: bge_m3_api
      RERANK_PROVIDER: "none"  # was: colbert — CPU takes 12.6s
      BGE_M3_URL: http://bge-m3:8000
      BGE_M3_TIMEOUT: "120"
      RERANK_CANDIDATES_MAX: "5"
      # Semantic cache
      USE_LOCAL_EMBEDDINGS: "true"
      USER_BASE_URL: http://user-base:8000
      # Services
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      # LLM
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      # Langfuse observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_TRACING_ENVIRONMENT: "${LANGFUSE_TRACING_ENVIRONMENT:-}"
      LANGFUSE_FLUSH_AT: "${LANGFUSE_FLUSH_AT:-512}"
      LANGFUSE_FLUSH_INTERVAL: "${LANGFUSE_FLUSH_INTERVAL:-5.0}"
      LANGFUSE_PROMPT_LABEL: "${LANGFUSE_PROMPT_LABEL:-production}"
      # Pipeline mode
      CLIENT_DIRECT_PIPELINE_ENABLED: "true"
      # Domain configuration
      BOT_DOMAIN: ${BOT_DOMAIN:-недвижимость}
      BOT_LANGUAGE: ${BOT_LANGUAGE:-ru}
      # CRM — Kommo integration
      KOMMO_ENABLED: "${KOMMO_ENABLED:-false}"
      KOMMO_SUBDOMAIN: "${KOMMO_SUBDOMAIN:-}"
      KOMMO_ACCESS_TOKEN: "${KOMMO_ACCESS_TOKEN:-}"
      KOMMO_CLIENT_ID: "${KOMMO_CLIENT_ID:-}"
      KOMMO_CLIENT_SECRET: "${KOMMO_CLIENT_SECRET:-}"
      KOMMO_REDIRECT_URI: "${KOMMO_REDIRECT_URI:-}"
      KOMMO_TELEGRAM_FIELD_ID: "${KOMMO_TELEGRAM_FIELD_ID:-0}"
      KOMMO_DEFAULT_PIPELINE_ID: "${KOMMO_DEFAULT_PIPELINE_ID:-0}"
      KOMMO_RESPONSIBLE_USER_ID: "${KOMMO_RESPONSIBLE_USER_ID:-0}"
      KOMMO_SESSION_FIELD_ID: "${KOMMO_SESSION_FIELD_ID:-0}"
      KOMMO_LEAD_SCORE_FIELD_ID: "${KOMMO_LEAD_SCORE_FIELD_ID:-0}"
      KOMMO_LEAD_BAND_FIELD_ID: "${KOMMO_LEAD_BAND_FIELD_ID:-0}"
      KOMMO_NEW_STATUS_ID: "${KOMMO_NEW_STATUS_ID:-0}"
      KOMMO_SERVICE_FIELD_ID: "${KOMMO_SERVICE_FIELD_ID:-0}"
      KOMMO_SOURCE_FIELD_ID: "${KOMMO_SOURCE_FIELD_ID:-0}"
      KOMMO_TELEGRAM_USERNAME_FIELD_ID: "${KOMMO_TELEGRAM_USERNAME_FIELD_ID:-0}"
      # Manager
      MANAGER_IDS: "${MANAGER_IDS:-}"
      MANAGER_HOT_LEAD_THRESHOLD: "${MANAGER_HOT_LEAD_THRESHOLD:-60}"
      MANAGER_HOT_LEAD_DEDUPE_SEC: "${MANAGER_HOT_LEAD_DEDUPE_SEC:-3600}"
      # Real Estate DB
      REALESTATE_DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/realestate"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      user-base:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # INGESTION PIPELINE
  # =============================================================================

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: vps-ingestion
    profiles: ["ingest"]
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      - GDRIVE_SYNC_DIR=/data/drive-sync
      - INGESTION_DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/cocoindex
      - QDRANT_URL=http://qdrant:6333
      - DOCLING_URL=http://docling:5001
      - GDRIVE_COLLECTION_NAME=gdrive_documents_bge
      # Local embeddings (no Voyage API)
      - USE_LOCAL_DENSE_EMBEDDINGS=true
      - BGE_M3_URL=http://bge-m3:8000
      - BGE_M3_TIMEOUT=600
      - BGE_M3_CONCURRENCY=1
      - MANIFEST_DIR=/data/manifest
    volumes:
      - ${GDRIVE_SYNC_DIR:-~/drive-sync}:/data/drive-sync:ro
      - ingestion-manifest:/data/manifest
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # ML PLATFORM (Langfuse)
  # =============================================================================

  clickhouse:
    image: clickhouse/clickhouse-server:26.1@sha256:7f6546e5e293cfcdb812675fde424dc9bce3d32ac86f18051fedc23bff75a724
    container_name: vps-clickhouse
    restart: unless-stopped
    logging: *default-logging
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1536M

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z@sha256:1dce27c494a16bae114774f1cec295493f3613142713130c2d22dd5696be6ad3
    container_name: vps-minio
    restart: unless-stopped
    logging: *default-logging
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  redis-langfuse:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    container_name: vps-redis-langfuse
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD:-langfuseredis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD:-langfuseredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  langfuse-worker:
    image: langfuse/langfuse-worker:3.150.0@sha256:e4c98263d86593e2ba76e104c7e62e1c0c306785b84d83e21f74ef9f2d9bd0c9
    container_name: vps-langfuse-worker
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment: &langfuse-worker-env
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/langfuse
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://langfuse.awdawdawd.space}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      SALT: ${SALT:?SALT is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis-langfuse
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-langfuseredis}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    deploy:
      resources:
        limits:
          memory: 512M

  langfuse:
    image: langfuse/langfuse:3.150.0@sha256:7f47fd823a5d6f8b1195e0ca6830f8f99e78a659b150ccdb077d188674efb1b6
    container_name: vps-langfuse
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-worker:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      <<: *langfuse-worker-env
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1024M

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
  docling_cache:
  ingestion-manifest:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
