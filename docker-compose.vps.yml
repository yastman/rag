# VPS Stack - Local embeddings, no Voyage API dependency
# Start: docker compose --compatibility -f docker-compose.vps.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =============================================================================
  # DATABASES
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg17@sha256:3e8b3adfd27b5707128f60956f62a793c3c9326ea8cfaf0eab7adccb5d700b21
    container_name: vps-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    container_name: vps-redis
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy volatile-lfu
      --maxmemory-samples 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  qdrant:
    image: qdrant/qdrant:v1.16.2@sha256:dab6de32f7b2cc599985a7c764db3e8b062f70508fb85ca074aa856f829bf335
    container_name: vps-qdrant
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # qdrant/qdrant image doesn't include curl/wget; use bash + /dev/tcp to hit /readyz.
      # NOTE: docker-compose interpolates `$VAR`; use `$$` to pass literal `$` into the container.
      test: ["CMD-SHELL", "bash -c 'set -euo pipefail; exec 3<>/dev/tcp/localhost/6333; echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r line <&3; [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # DOCUMENT PROCESSING
  # =============================================================================

  docling:
    build:
      context: ./services/docling
      dockerfile: Dockerfile
    container_name: vps-docling
    restart: unless-stopped
    logging: *default-logging
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
      DOCLING_BACKEND: docling
      DOCLING_PDF_BACKEND: dlparse_v2
      DOCLING_TABLE_MODE: accurate
    volumes:
      - ./data/docling:/data
      - docling_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  # =============================================================================
  # ML SERVICES (Local embeddings)
  # =============================================================================

  bge-m3:
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    container_name: vps-bge-m3
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      OMP_NUM_THREADS: 2
      MKL_NUM_THREADS: 2
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

  user-base:
    build:
      context: ./services/user-base
      dockerfile: Dockerfile
    container_name: vps-user-base
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - hf_cache:/models
    environment:
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  # =============================================================================
  # LLM GATEWAY
  # =============================================================================

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.81.3-stable@sha256:3d80908e35230a0dfb58051ae4e2847371b2a327b44e105e79b8c4f67a65596c
    container_name: vps-litellm
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["--config", "/app/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # TELEGRAM BOT
  # =============================================================================

  bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: vps-bot
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      # Local embeddings (no Voyage API needed)
      RETRIEVAL_DENSE_PROVIDER: bge_m3_api
      RETRIEVAL_SPARSE_PROVIDER: bge_m3_api
      RERANK_PROVIDER: "none"  # was: colbert — CPU takes 12.6s
      BGE_M3_URL: http://bge-m3:8000
      BGE_M3_TIMEOUT: "120"
      COLBERT_TIMEOUT: "120"
      RERANK_CANDIDATES_MAX: "5"  # ColBERT CPU: 5 docs ~15s vs 10 docs ~30s
      # Semantic cache
      USE_LOCAL_EMBEDDINGS: "true"
      USER_BASE_URL: http://user-base:8000
      # Services
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      # LLM
      LLM_API_KEY: ${LITELLM_MASTER_KEY}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      # Domain configuration
      BOT_DOMAIN: ${BOT_DOMAIN:-недвижимость}
      BOT_LANGUAGE: ${BOT_LANGUAGE:-ru}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      user-base:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # INGESTION PIPELINE
  # =============================================================================

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: vps-ingestion
    profiles: ["ingest"]
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      - GDRIVE_SYNC_DIR=/data/drive-sync
      - INGESTION_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cocoindex
      - QDRANT_URL=http://qdrant:6333
      - DOCLING_URL=http://docling:5001
      - GDRIVE_COLLECTION_NAME=gdrive_documents_bge
      # Local embeddings (no Voyage API)
      - USE_LOCAL_DENSE_EMBEDDINGS=true
      - BGE_M3_URL=http://bge-m3:8000
      - BGE_M3_TIMEOUT=600
      - BGE_M3_CONCURRENCY=1
      - MANIFEST_DIR=/data/manifest
    volumes:
      - ${GDRIVE_SYNC_DIR:-~/drive-sync}:/data/drive-sync:ro
      - ingestion-manifest:/data/manifest
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
  docling_cache:
  ingestion-manifest:
