# docker-compose.local.yml
# Локальная среда разработки для RAG проекта
# Запуск: docker compose -f docker-compose.local.yml up -d

services:
  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis with Vector Search
  redis:
    image: redis/redis-stack:7.4.0-v3
    container_name: rag-redis
    ports:
      - "6379:6379"
      - "8002:8001"  # RedisInsight на 8002 (8001 занят BGE-M3)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # BGE-M3 Embeddings API
  bge-m3:
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    container_name: rag-bge-m3
    ports:
      - "8001:8000"
    volumes:
      - bge_models:/models
    environment:
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - MODEL_CACHE_DIR=/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  # Docling Document Parser
  docling:
    image: ds4sd/docling-serve:latest
    container_name: rag-docling
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qdrant_data:
  redis_data:
  bge_models:
