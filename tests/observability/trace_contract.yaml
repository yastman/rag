# Spans that must set capture_input=False, capture_output=False in production.
# These spans handle PII, raw embeddings, or security-sensitive payloads.
sensitive_spans:
  # graph_nodes (excluding node-guard, node-classify, node-grade, node-rerank, node-rewrite)
  - transcribe
  - classify-query
  - node-cache-check
  - node-cache-store
  - node-retrieve
  - node-generate
  - node-respond
  - node-summarize
  # agent_pipeline
  - rag-pipeline
  - cache-check
  - hybrid-retrieve
  - cache-store
  # agent_tools
  - tool-rag-search
  - tool-history-search
  - tool-apartment-search
  # history_graph
  - history-retrieve
  - history-summarize
  # cache (all tiers handle raw vectors / PII responses)
  - cache-semantic-check
  - cache-semantic-store
  - cache-exact-get
  - cache-exact-store
  - cache-embedding-get
  - cache-embedding-store
  - cache-sparse-get
  - cache-sparse-store
  - cache-search-get
  - cache-search-store
  - cache-rerank-get
  - cache-rerank-store
  # bge_m3_client (raw vectors)
  - bge-m3-encode-dense
  - bge-m3-encode-sparse
  - bge-m3-encode-hybrid
  - bge-m3-rerank
  - bge-m3-encode-colbert
  # qdrant (raw search payloads + lifecycle)
  - qdrant-ensure-collection
  - qdrant-apply-strict-mode
  - qdrant-ensure-alias
  - qdrant-hybrid-search-rrf
  - qdrant-hybrid-search-rrf-colbert
  - qdrant-batch-search-rrf
  - qdrant-search-score-boosting
  - qdrant-mmr-rerank
  # history_service (conversation PII)
  - history-save
  - history-search
  - history-delete
  - history-get-session-turns
  # pipeline
  - detect-agent-intent
  - client-direct-pipeline
  # services
  - service-generate-response
  - detect-response-style
  - get-prompt
  - kommo-token-get
  - kommo-token-refresh
  - apartments-hybrid-search
  # voice + api entry points
  - voice-session
  - rag-api-query
  # ingestion
  - ingestion-cli-run
  - ingestion-cli-preflight
  - ingestion-flow-run-once
  - ingestion-flow-watch
  - ingestion-qdrant-delete-file
  - ingestion-qdrant-upsert-chunks

scores:
  core_rag:
    - query_type
    - latency_total_ms
    - semantic_cache_hit
    - embeddings_cache_hit
    - search_cache_hit
    - rerank_applied
    - rerank_cache_hit
    - results_count
    - no_results
    - llm_used
    - confidence_score
    - llm_ttft_ms
    - llm_response_duration_ms
  history:
    - history_search_count
    - history_search_empty
    - history_backend
    - history_search_latency_ms
  crm:
    - crm_tool_used
    - crm_tools_count
    - crm_tools_success
    - crm_tools_error
  supervisor:
    - supervisor_model
    - user_role
    - hitl_action
    - user_feedback

error_allowlist:
  # Graph nodes — core pipeline error/fallback paths
  - span: node-generate
    level: ERROR
    trigger: "LLM call failed"
  - span: node-generate
    level: WARNING
    trigger: "Streaming failed"
  - span: node-rewrite
    level: ERROR
    trigger: "LLM rewrite failed"
  - span: node-rerank
    level: ERROR
    trigger: "ColBERT failed"
  - span: node-respond
    level: ERROR
    trigger: "Telegram send failed"
  - span: node-cache-check
    level: ERROR
    trigger: "Cache check failed"
  # Agent tools — pipeline wrapper error paths
  - span: tool-rag-search
    level: ERROR
    trigger: "RAG pipeline failed"
  - span: tool-history-search
    level: ERROR
    trigger: "History search failed"
  - span: rag-pipeline
    level: ERROR
    trigger: "Agent pipeline step failed"
  - span: history-retrieve
    level: ERROR
    trigger: "History search failed"
  - span: history-rewrite
    level: ERROR
    trigger: "History rewrite failed"
  - span: history-summarize
    level: ERROR
    trigger: "History summarize failed"
  # Services — curated error spans for degraded operations
  - span: cache-*
    level: ERROR
    trigger: "Cache tier operation failed"
  - span: cache-semantic-check
    level: WARNING
    trigger: "Semantic similarity below threshold"
  - span: service-generate-response
    level: ERROR
    trigger: "Generation failed"
  - span: service-generate-response
    level: WARNING
    trigger: "Streaming/fallback degradation"
  - span: qdrant-*
    level: ERROR
    trigger: "Qdrant operation failed"
  - span: qdrant-*
    level: WARNING
    trigger: "Qdrant lifecycle warning"
  - span: history-delete
    level: ERROR
    trigger: "History deletion failed"
