# Dev Stack for RAG Bot Development
# Start: docker compose -f docker-compose.dev.yml up -d
# Stop:  docker compose -f docker-compose.dev.yml down
# Reset: docker compose -f docker-compose.dev.yml down -v

services:
  # =============================================================================
  # DATABASES
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg17
    container_name: dev-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis/redis-stack:latest
    container_name: dev-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: dev-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # AI SERVICES
  # =============================================================================

  bge-m3:
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    container_name: dev-bge-m3
    ports:
      - "8000:8000"
    volumes:
      - bge_models:/models
    environment:
      OMP_NUM_THREADS: 4
      MKL_NUM_THREADS: 4
      MODEL_CACHE_DIR: /models
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  bm42:
    build:
      context: ./services/bm42
      dockerfile: Dockerfile
    container_name: dev-bm42
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  user-base:
    build:
      context: ./services/user-base
      dockerfile: Dockerfile
    container_name: dev-user-base
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  docling:
    image: ghcr.io/docling-project/docling-serve-cpu:main
    container_name: dev-docling
    ports:
      - "5001:5001"
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  lightrag:
    image: ghcr.io/hkuds/lightrag:v1.4.9.11
    container_name: dev-lightrag
    ports:
      - "9621:9621"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      LLM_BINDING: openai
      EMBEDDING_BINDING: openai
      LLM_MODEL: gpt-4o-mini
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIM: 1536
    volumes:
      - lightrag_data:/app/lightrag_data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9621/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================================================
  # ML PLATFORM
  # =============================================================================

  langfuse:
    image: langfuse/langfuse:2
    container_name: dev-langfuse
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_SECRET: dev-secret-change-in-production
      SALT: dev-salt-change-in-production
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: dev-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: >
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # TELEGRAM BOT (Voyage AI powered)
  # =============================================================================

  bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: dev-bot
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Voyage AI
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      VOYAGE_EMBED_MODEL: ${VOYAGE_EMBED_MODEL:-voyage-3-large}
      VOYAGE_CACHE_MODEL: ${VOYAGE_CACHE_MODEL:-voyage-3-lite}
      VOYAGE_RERANK_MODEL: ${VOYAGE_RERANK_MODEL:-rerank-2}
      # LLM (Cerebras)
      LLM_API_KEY: ${LLM_API_KEY:-${CEREBRAS_API_KEY}}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.cerebras.ai/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen-3-32b}
      # Services (Docker internal network)
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-contextual_bulgaria_voyage}
      BM42_URL: http://bm42:8000
      USER_BASE_URL: http://user-base:8000
      # Cache settings
      CACHE_SIMILARITY_THRESHOLD: ${CACHE_SIMILARITY_THRESHOLD:-0.95}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bm42:
        condition: service_healthy
      user-base:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  bge_models:
  lightrag_data:
  mlflow_artifacts:
