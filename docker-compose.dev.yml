# Dev Stack for RAG Bot Development
# Start: docker compose -f docker-compose.dev.yml up -d
# Stop:  docker compose -f docker-compose.dev.yml down
# Reset: docker compose -f docker-compose.dev.yml down -v

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =============================================================================
  # DATABASES
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg17@sha256:3e8b3adfd27b5707128f60956f62a793c3c9326ea8cfaf0eab7adccb5d700b21
    container_name: dev-postgres
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    container_name: dev-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_redis_pass}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_pass}
      --maxmemory 512mb
      --maxmemory-policy volatile-lfu
      --maxmemory-samples 10
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16.2@sha256:dab6de32f7b2cc599985a7c764db3e8b062f70508fb85ca074aa856f829bf335
    container_name: dev-qdrant
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # AI SERVICES
  # =============================================================================

  bge-m3:
    build:
      context: ./services/bge-m3-api
      dockerfile: Dockerfile
    container_name: dev-bge-m3
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - hf_cache:/models
    environment:
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      MODEL_CACHE_DIR: /models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  user-base:
    build:
      context: ./services/user-base
      dockerfile: Dockerfile
    container_name: dev-user-base
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - hf_cache:/models
    environment:
      HF_HOME: /models/hf
      TRANSFORMERS_CACHE: /models/hf
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  docling:
    build:
      context: ./services/docling
      dockerfile: Dockerfile
    container_name: dev-docling
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
      # Docling configuration for optimal RAG chunking
      DOCLING_BACKEND: docling
      DOCLING_PDF_BACKEND: dlparse_v2
      DOCLING_TABLE_MODE: accurate
    volumes:
      - ./data/docling:/data
      - docling_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  # =============================================================================
  # ML PLATFORM
  # =============================================================================

  # ClickHouse for Langfuse v3 analytics
  clickhouse:
    image: clickhouse/clickhouse-server:26.1@sha256:be0cb54cf637cf6132081882bfdb33adc9826e4d87ec6fb65c8ab4e27fa91cbf
    container_name: dev-clickhouse
    profiles: ["ml", "full"]
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9009:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MinIO S3-compatible storage for Langfuse v3
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z@sha256:1dce27c494a16bae114774f1cec295493f3613142713130c2d22dd5696be6ad3
    container_name: dev-minio
    profiles: ["ml", "full"]
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis for Langfuse v3 (separate from app Redis)
  redis-langfuse:
    image: redis:8.6.0@sha256:7b6fb55d8b0adcd77269dc52b3cfffe5f59ca5d43dec3c90dbe18aacce7942e1
    container_name: dev-redis-langfuse
    profiles: ["ml", "full"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass langfuseredis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuseredis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  # Langfuse v3 Worker
  langfuse-worker:
    image: langfuse/langfuse-worker:3.153.0@sha256:32e2fe1193c3703c44a85e00aac005690570a85a309f0202a51b72d432673e78
    container_name: dev-langfuse-worker
    profiles: ["ml", "full"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment: &langfuse-env
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      # Auth
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      SALT: ${SALT:?SALT is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      # ClickHouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # S3/MinIO
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      # Redis
      REDIS_HOST: redis-langfuse
      REDIS_PORT: 6379
      REDIS_AUTH: langfuseredis
      # Telemetry
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Langfuse v3 Web
  langfuse:
    image: langfuse/langfuse:3.153.0@sha256:99eae0d0734a62e29378f038b84de9eed4ba8dbe69878f9b680351c2324a4949
    container_name: dev-langfuse
    profiles: ["ml", "full"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-worker:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      <<: *langfuse-env
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: dev-mlflow
    profiles: ["eval", "ml", "full"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: >
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # MONITORING & ALERTING
  # =============================================================================

  loki:
    image: grafana/loki:3.6.5@sha256:847c287ada0e12603910589f42038c5cdaaad04e248bd1dc6c6e0920a235f427
    container_name: dev-loki
    profiles: ["obs", "full"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/monitoring/loki.yaml:/etc/loki/local-config.yaml:ro
      - ./docker/monitoring/rules:/etc/loki/rules/fake:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.6.5@sha256:6140a3158fddd7ef2276908bd321ad5265ee6ad2abd9fb3c937394827df3ea4d
    container_name: dev-promtail
    profiles: ["obs", "full"]
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      # promtail image does not include wget/curl; use the binary itself for a lightweight healthcheck
      test: ["CMD", "/usr/bin/promtail", "--version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  alertmanager:
    image: prom/alertmanager:v0.31.1@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1
    container_name: dev-alertmanager
    profiles: ["obs", "full"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./docker/monitoring/alertmanager.yaml:/etc/alertmanager/alertmanager.tmpl:ro
      - alertmanager_data:/alertmanager
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Check if Telegram bot token is configured
        if [ -z "$${TELEGRAM_ALERTING_BOT_TOKEN}" ]; then
          echo "WARNING: TELEGRAM_ALERTING_BOT_TOKEN not set, using null receiver"
          # Create minimal config with null receiver
          cat > /etc/alertmanager/alertmanager.yml << 'NULLCONFIG'
        global:
          resolve_timeout: 5m
        route:
          receiver: 'null'
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        receivers:
          - name: 'null'
        NULLCONFIG
        else
          # Substitute environment variables in config template
          cat /etc/alertmanager/alertmanager.tmpl | \
            sed "s|\$${TELEGRAM_ALERTING_BOT_TOKEN}|$${TELEGRAM_ALERTING_BOT_TOKEN}|g" | \
            sed "s|\$${TELEGRAM_ALERTING_CHAT_ID}|$${TELEGRAM_ALERTING_CHAT_ID}|g" \
            > /etc/alertmanager/alertmanager.yml
        fi
        # Start alertmanager
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=http://localhost:9093
    environment:
      TELEGRAM_ALERTING_BOT_TOKEN: ${TELEGRAM_ALERTING_BOT_TOKEN:-}
      TELEGRAM_ALERTING_CHAT_ID: ${TELEGRAM_ALERTING_CHAT_ID:-0}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.81.3-stable@sha256:3d80908e35230a0dfb58051ae4e2847371b2a327b44e105e79b8c4f67a65596c
    container_name: dev-litellm
    profiles: ["bot", "voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    environment:
      # Auth
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      # LLM Providers
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-${LLM_API_KEY}}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Langfuse v3 OTEL (Docker internal network)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_OTEL_HOST: http://langfuse:3000
      # Database for virtual keys
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/litellm
    command: ["--config", "/app/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # TELEGRAM BOT (Local BGE-M3 embeddings — matches VPS production)
  # =============================================================================

  bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: dev-bot
    profiles: ["bot", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      # Local embeddings (matches VPS production)
      RETRIEVAL_DENSE_PROVIDER: bge_m3_api
      RETRIEVAL_SPARSE_PROVIDER: bge_m3_api
      RERANK_PROVIDER: colbert
      BGE_M3_URL: http://bge-m3:8000
      BGE_M3_TIMEOUT: "${BGE_M3_TIMEOUT:-120}"
      GENERATE_MAX_TOKENS: "${GENERATE_MAX_TOKENS:-2048}"
      COLBERT_TIMEOUT: "${COLBERT_TIMEOUT:-120}"
      RERANK_CANDIDATES_MAX: "${RERANK_CANDIDATES_MAX:-10}"
      # Semantic cache
      USE_LOCAL_EMBEDDINGS: "true"
      USER_BASE_URL: http://user-base:8000
      # Services
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_redis_pass}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      # LLM (via LiteLLM Proxy)
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      # Latency knobs
      MAX_REWRITE_ATTEMPTS: "${MAX_REWRITE_ATTEMPTS:-1}"
      REWRITE_MAX_TOKENS: "${REWRITE_MAX_TOKENS:-64}"
      # Domain configuration
      BOT_DOMAIN: ${BOT_DOMAIN:-недвижимость}
      BOT_LANGUAGE: ${BOT_LANGUAGE:-ru}
      # Langfuse observability (optional — bot degrades gracefully)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      user-base:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

# =============================================================================
  # UNIFIED INGESTION PIPELINE (v3.2.1)
  # =============================================================================

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: dev-ingestion
    profiles: ["ingest", "full"]
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    environment:
      - GDRIVE_SYNC_DIR=/data/drive-sync
      - INGESTION_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cocoindex
      - QDRANT_URL=http://qdrant:6333
      - DOCLING_URL=http://docling:5001
      - GDRIVE_COLLECTION_NAME=gdrive_documents_bge
      # Local embeddings (matches VPS production)
      - USE_LOCAL_DENSE_EMBEDDINGS=true
      - BGE_M3_URL=http://bge-m3:8000
      - BGE_M3_TIMEOUT=600
      - BGE_M3_CONCURRENCY=1
      - MANIFEST_DIR=/data/manifest
    volumes:
      - ${GDRIVE_SYNC_DIR:-~/drive-sync}:/data/drive-sync:ro
      - ingestion-manifest:/data/manifest
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "src.ingestion.unified.cli"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # =============================================================================
  # VOICE (LiveKit Agents + SIP)
  # =============================================================================

  rag-api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: dev-rag-api
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_redis_pass}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gdrive_documents_bge}
      BGE_M3_URL: http://bge-m3:8000
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: gpt-4o-mini
      RERANK_PROVIDER: colbert
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bge-m3:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  livekit-server:
    image: livekit/livekit-server:v1.9@sha256:289262ffae8b827f45186331aa315d08ed275eb30f9b0add337ec57948e44ca1
    container_name: dev-livekit
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./docker/livekit:/etc/livekit:ro
    command: --config /etc/livekit/livekit.yaml --dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  livekit-sip:
    image: livekit/sip:latest@sha256:96ef59d461e692c43c77bfe2caa8b469e662e2cc1158082e3af5434184225897
    container_name: dev-livekit-sip
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5060:5060/udp"
      - "5061:5061/tcp"
      - "10000-10100:10000-10100/udp"
    environment:
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_WS_URL: ws://livekit-server:7880
      SIP_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit-server:7880
        redis:
          address: redis:6379
          password: ${REDIS_PASSWORD:-dev_redis_pass}
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: false
        log_level: info
      SIP_PORT: "5060"
      RTP_PORT_LOW: "10000"
      RTP_PORT_HIGH: "10100"
    depends_on:
      livekit-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  voice-agent:
    build:
      context: .
      dockerfile: src/voice/Dockerfile
    container_name: dev-voice-agent
    profiles: ["voice", "full"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      LIVEKIT_URL: ws://livekit-server:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      ELEVEN_API_KEY: ${ELEVENLABS_API_KEY:-}
      RAG_API_URL: http://rag-api:8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      livekit-server:
        condition: service_healthy
      rag-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
  docling_cache:
  mlflow_artifacts:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  ingestion-manifest:
  loki_data:
  alertmanager_data:
