name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Relevant log output or screenshots
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Project version or commit hash
