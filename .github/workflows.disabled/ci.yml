# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ telegram_bot/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ telegram_bot/ tests/

      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  # Tests require external services (Qdrant, Redis, BGE-M3)
  # Run locally with: make local-up && pytest tests/
  # TODO: Add service containers for CI testing
