name: Deploy Bot

on:
  push:
    branches: [main]
    paths:
      - 'telegram_bot/**'
      - 'src/**'
      - 'docker-compose.vps.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bot to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/rag-fresh

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Rebuild bot image ==="
            docker compose -f docker-compose.vps.yml build bot

            echo "=== Restart bot ==="
            docker compose --compatibility -f docker-compose.vps.yml up -d --force-recreate bot

            echo "=== Wait for startup ==="
            sleep 15

            echo "=== Health check ==="
            docker ps --format '{{.Names}} {{.Status}}' | grep vps-bot

            echo "=== Deploy complete $(date -Iseconds) ==="
