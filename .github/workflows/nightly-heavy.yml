name: Nightly Heavy Tests

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-heavy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # All unit tests (including slow, requires_extras) — full tier
  # ---------------------------------------------------------------------------
  unit-full:
    name: Unit Tests (full tier)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra voice --extra ingest --extra eval

      - name: Run all unit tests (full tier)
        run: |
          uv run pytest tests/unit/ \
            -n auto --dist loadscope \
            --timeout=30 \
            -m "not legacy_api" \
            --durations=20 --durations-min=1.0 \
            -q

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-full-results
          path: |
            .pytest_cache/
            reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Heavy suites: chaos, smoke, slow unit tests
  # ---------------------------------------------------------------------------
  heavy:
    name: Heavy Test Tier (chaos, smoke, slow)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra voice --extra ingest --extra eval

      - name: Run nightly heavy suites
        run: make test-nightly

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: heavy-tier-results
          path: |
            .pytest_cache/
            reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Baseline regression — nightly cadence
  # ---------------------------------------------------------------------------
  baseline-nightly:
    name: Baseline Regression (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ secrets.LANGFUSE_SECRET_KEY != '' && secrets.LANGFUSE_PUBLIC_KEY != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra voice --extra ingest --extra eval

      - name: Run baseline comparison
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          DATE_TAG="$(date +%Y%m%d)"
          CURRENT_SESSION="nightly-${DATE_TAG}-${GITHUB_RUN_ATTEMPT}"

          uv run python3 -m tests.baseline.cli compare \
            --baseline-tag="main-latest" \
            --current-session="${CURRENT_SESSION}" \
            --thresholds=tests/baseline/thresholds.yaml \
            --output="reports/baseline-${CURRENT_SESSION}.json"

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-baseline-report
          path: reports/baseline-*.json
          retention-days: 30
