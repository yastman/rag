name: CI & Deploy

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --python 3.14 --frozen --no-dev

      - name: Ruff lint
        run: uv run --python 3.14 ruff check src/ telegram_bot/ --output-format=github

      - name: Ruff format check
        run: uv run --python 3.14 ruff format --target-version py312 --check src/ telegram_bot/

      - name: Type check
        run: uv run --python 3.14 mypy src/ telegram_bot/ --ignore-missing-imports --no-error-summary

      - name: Validate Compose configs
        run: |
          COMPOSE_DISABLE_ENV_FILE=1 docker compose --env-file tests/fixtures/compose.ci.env -f compose.yml -f compose.dev.yml config --quiet
          COMPOSE_DISABLE_ENV_FILE=1 docker compose --env-file tests/fixtures/compose.ci.env -f compose.yml -f compose.vps.yml config --quiet

      - name: Hadolint Dockerfile lint
        run: |
          curl -sL -o /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
          for f in \
            src/api/Dockerfile \
            Dockerfile.ingestion \
            telegram_bot/Dockerfile \
            services/bge-m3-api/Dockerfile \
            services/user-base/Dockerfile \
            services/docling/Dockerfile \
            src/voice/Dockerfile \
            mini_app/Dockerfile; do
            /tmp/hadolint --failure-threshold error "$f"
          done

      - name: Gitleaks secret scan
        run: |
          curl -sL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.23.1/gitleaks_8.23.1_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          cat > /tmp/gitleaks.toml << 'EOF'
          [allowlist]
          paths = [
            '''\.env\.example$''',
            '''k8s/secrets/\.env\.example$''',
            '''tests/unit/test_topic_service_init\.py$''',
          ]
          EOF
          /tmp/gitleaks detect --source . --no-git --config /tmp/gitleaks.toml --verbose

      - name: Set up Python for tests
        run: uv python install 3.12

      - name: Install dev dependencies
        run: UV_PROJECT_ENVIRONMENT=.venv-py312 uv sync --python 3.12 --frozen

      - name: Unit tests
        run: UV_PROJECT_ENVIRONMENT=.venv-py312 uv run pytest tests/unit/ -n auto --dist=worksteal -x -q --timeout=30

      - name: Security scan (bandit + vulture)
        run: |
          UV_PROJECT_ENVIRONMENT=.venv-py312 uv run bandit -r src/ telegram_bot/ -c pyproject.toml
          UV_PROJECT_ENVIRONMENT=.venv-py312 uv run vulture src/ telegram_bot/ --min-confidence 80

  deploy:
    name: Deploy to VPS
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/rag-fresh
            export COMPOSE_FILE=compose.yml:compose.vps.yml
            export DOCKER_BUILDKIT=1
            export BUILDKIT_INLINE_CACHE=1

            echo "=== Pull latest code ==="
            git fetch origin main
            if [ -n "$(git status --porcelain)" ]; then
              echo "WARNING: Dirty tree detected; stashing local changes before reset"
              git stash push -m "deploy-auto-stash-$(date +%s)"
            fi
            git reset --hard origin/main

            echo "=== Normalize bind-mounted config permissions ==="
            chmod 644 ./docker/litellm/config.yaml

            echo "=== Validate production env ==="
            chmod +x ./scripts/validate_prod_env.sh
            ./scripts/validate_prod_env.sh

            echo "=== Rebuild changed images ==="
            docker compose build

            echo "=== Restart services from rebuilt images ==="
            docker compose --compatibility up -d --wait --force-recreate

            echo "=== Release smoke ==="
            chmod +x ./scripts/test_release_health_vps.sh
            REQUIRE_MINI_APP_ENDPOINT=true ./scripts/test_release_health_vps.sh

            echo "=== Deploy complete $(date -Iseconds) ==="
