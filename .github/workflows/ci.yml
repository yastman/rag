# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ telegram_bot/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ telegram_bot/ tests/

      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  # Tests require external services (Qdrant, Redis, BGE-M3)
  # Run locally with: make local-up && pytest tests/
  # TODO: Add service containers for CI testing

  # Baseline comparison - runs when Langfuse secrets are configured
  # Compares current smoke tests against main-latest baseline
  # Fails if regression > thresholds defined in tests/baseline/thresholds.yaml
  baseline-compare:
    name: Baseline Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint
    # Only run if Langfuse secrets are configured
    env:
      LANGFUSE_AVAILABLE: ${{ secrets.LANGFUSE_SECRET_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
        if: env.LANGFUSE_AVAILABLE == 'true'

      - name: Set up Python
        if: env.LANGFUSE_AVAILABLE == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: env.LANGFUSE_AVAILABLE == 'true'
        run: pip install -e ".[dev]"

      - name: Run baseline comparison
        if: env.LANGFUSE_AVAILABLE == 'true'
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          # Get current session tag from commit
          CURRENT_TAG="ci-${{ github.sha }}-$(date +%Y%m%d)"

          # Compare against main-latest baseline
          python3 -m tests.baseline.cli compare \
            --baseline="main-latest" \
            --current="${CURRENT_TAG}" \
            --thresholds=tests/baseline/thresholds.yaml \
            --hours=168

      - name: Skip - Langfuse not configured
        if: env.LANGFUSE_AVAILABLE != 'true'
        run: echo "Skipping baseline comparison - LANGFUSE_SECRET_KEY not configured"
