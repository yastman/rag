name: CI & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Ruff lint
        run: uv run ruff check src/ telegram_bot/ --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check src/ telegram_bot/

      - name: Type check
        run: uv run mypy src/ telegram_bot/ --ignore-missing-imports --no-error-summary

  deploy:
    name: Deploy Bot to VPS
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/rag-fresh

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Rebuild bot image ==="
            docker compose -f docker-compose.vps.yml build bot

            echo "=== Restart bot ==="
            docker compose --compatibility -f docker-compose.vps.yml up -d --force-recreate bot

            echo "=== Wait for startup ==="
            sleep 15

            echo "=== Health check ==="
            docker ps --format '{{.Names}} {{.Status}}' | grep vps-bot

            echo "=== Deploy complete $(date -Iseconds) ==="
