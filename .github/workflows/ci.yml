name: CI & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Ruff lint
        run: uv run ruff check src/ telegram_bot/ --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check src/ telegram_bot/

      - name: Type check
        run: uv run mypy src/ telegram_bot/ --ignore-missing-imports --no-error-summary

      - name: Security scan (bandit + vulture)
        run: |
          uv run bandit -r src/ telegram_bot/ -c pyproject.toml
          uv run vulture src/ telegram_bot/ --min-confidence 80

  deploy:
    name: Deploy to VPS
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/rag-fresh

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Rebuild changed images ==="
            docker compose build

            echo "=== Restart changed services ==="
            docker compose --compatibility up -d

            echo "=== Wait for startup ==="
            sleep 20

            echo "=== Health check ==="
            docker ps --format '{{.Names}} {{.Status}}' | grep -E 'vps-.*(Up|healthy)'

            echo "=== Deploy complete $(date -Iseconds) ==="
