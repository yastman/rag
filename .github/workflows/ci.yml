# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src/ telegram_bot/ tests/ --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check src/ telegram_bot/ tests/

      - name: Type check
        run: uv run mypy src/ telegram_bot/ --ignore-missing-imports --no-error-summary

  # ---------------------------------------------------------------------------
  # PR Pipeline: 4 shards × xdist — fast feedback (~3-4 min)
  # ---------------------------------------------------------------------------
  test:
    name: "Unit Tests (shard ${{ matrix.group }}/${{ strategy.job-total }})"
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache test durations
        uses: actions/cache@v4
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run unit tests (shard ${{ matrix.group }}/4)
        run: |
          uv run pytest tests/unit/ \
            --splits 4 --group ${{ matrix.group }} \
            -n auto --dist loadscope \
            --timeout=30 \
            -m "not legacy_api" \
            --durations=20 --durations-min=1.0 \
            -q

      - name: Store durations (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          uv run pytest tests/unit/ \
            --store-durations \
            --timeout=30 \
            -m "not legacy_api" \
            -q || true

      - name: Upload durations
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Integration tests — no Docker, fully mocked, ~5s
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests (Graph Paths)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest tests/integration/test_graph_paths.py -v --timeout=30

  # ---------------------------------------------------------------------------
  # Baseline regression — PR only, requires Langfuse secrets
  # ---------------------------------------------------------------------------
  baseline-compare:
    name: Baseline Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint
    env:
      LANGFUSE_AVAILABLE: ${{ secrets.LANGFUSE_SECRET_KEY != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: env.LANGFUSE_AVAILABLE == 'true'

      - name: Install uv
        if: env.LANGFUSE_AVAILABLE == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        if: env.LANGFUSE_AVAILABLE == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: env.LANGFUSE_AVAILABLE == 'true'
        run: uv sync --frozen

      - name: Run baseline comparison
        if: env.LANGFUSE_AVAILABLE == 'true'
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          CURRENT_SESSION="ci-${SHORT_SHA}-${GITHUB_JOB}-${GITHUB_RUN_ATTEMPT}"

          uv run python3 -m tests.baseline.cli compare \
            --baseline-tag="main-latest" \
            --current-session="${CURRENT_SESSION}" \
            --thresholds=tests/baseline/thresholds.yaml \
            --output="reports/baseline-${CURRENT_SESSION}.json"

      - name: Upload baseline report
        if: always() && env.LANGFUSE_AVAILABLE == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: baseline-report
          path: reports/baseline-*.json
          retention-days: 30
