# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -e ".[dev]" || pip install -e .

      - name: Ruff lint
        run: ruff check src/ telegram_bot/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ telegram_bot/ tests/

      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install -e ".[dev]" || pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v \
            --ignore=tests/legacy/ \
            --ignore=tests/test_qdrant_connection.py \
            --ignore=tests/test_redis_cache.py \
            -x --tb=short
        env:
          QDRANT_URL: http://localhost:6333
          BGE_M3_URL: http://localhost:8001
