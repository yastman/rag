# .github/workflows/smoke-load.yml
name: Smoke & Load Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  smoke-routing:
    name: Smoke Routing (no deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run smoke routing tests
        run: make test-smoke-routing

  load-ci:
    name: Load Tests (mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run load tests (mocked)
        env:
          LOAD_USE_MOCKS: "1"
          LOAD_CHAT_COUNT: "5"
        run: make test-load-ci
