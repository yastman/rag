name: Publish Internal Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (example: v2.14.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-internal-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: rag-bot
            build_context: .
            dockerfile: telegram_bot/Dockerfile
          - image_name: rag-ingestion
            build_context: .
            dockerfile: Dockerfile.ingestion
          - image_name: rag-docling
            build_context: ./services/docling
            dockerfile: services/docling/Dockerfile
          - image_name: rag-user-base
            build_context: ./services/user-base
            dockerfile: services/user-base/Dockerfile
          - image_name: rag-bge-m3
            build_context: ./services/bge-m3-api
            dockerfile: services/bge-m3-api/Dockerfile

    steps:
      - name: Resolve release tag
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.version.outputs.value }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
