name: Release & Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-version:
    name: 🏷️ Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get version from tag
        id: get-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Check CHANGELOG.md
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "❌ Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi
          echo "✅ CHANGELOG.md contains version $VERSION"

  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: 📝 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-docker]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: release-notes
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}

          # Extract section for this version from CHANGELOG.md
          awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1 > release-notes.md

          # Display release notes
          echo "📋 Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate-version, build-docker]
    if: contains(needs.validate-version.outputs.version, 'beta') == false
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying version ${{ needs.validate-version.outputs.version }} to staging..."
          # Add your deployment script here
          # e.g., kubectl, helm, docker-compose, etc.

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests on staging..."
          # Add smoke test commands here

  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [validate-version, create-release, deploy-staging]
    if: always()
    steps:
      - name: Send Slack notification
        if: success()
        run: |
          echo "✅ Version ${{ needs.validate-version.outputs.version }} released successfully!"
          # Add Slack webhook here:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Release ${{ needs.validate-version.outputs.version }} deployed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Release ${{ needs.validate-version.outputs.version }} failed!"
          # Add failure notification here
