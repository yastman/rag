name: Update Roadmap Progress

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, merged]
  workflow_dispatch:

jobs:
  update-progress:
    name: 📊 Update ROADMAP.md Progress
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Calculate progress
        id: progress
        run: |
          # Count tasks in ROADMAP.md
          TOTAL=$(grep -c "^- \[ \]" ROADMAP.md || echo "0")
          DONE=$(grep -c "^- \[x\]" ROADMAP.md || echo "0")

          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$((DONE * 100 / TOTAL))
          else
            PERCENT=0
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "done=$DONE" >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

          echo "📊 Progress: $DONE/$TOTAL tasks ($PERCENT%)"

      - name: Update progress bar in ROADMAP.md
        run: |
          PERCENT=${{ steps.progress.outputs.percent }}
          DONE=${{ steps.progress.outputs.done }}
          TOTAL=${{ steps.progress.outputs.total }}

          # Generate progress bar
          FILLED=$((PERCENT / 10))
          EMPTY=$((10 - FILLED))
          BAR=$(printf '█%.0s' $(seq 1 $FILLED))$(printf '░%.0s' $(seq 1 $EMPTY))

          # Update ROADMAP.md
          sed -i "s/\*\*Общий прогресс:\*\* \`.*\` задач выполнено/**Общий прогресс:** \`$DONE\/$TOTAL\` задач выполнено/" ROADMAP.md

          echo "✅ Updated ROADMAP.md with progress: $DONE/$TOTAL ($PERCENT%)"

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ -n "$(git status --porcelain)" ]; then
            git add ROADMAP.md
            git commit -m "docs(roadmap): auto-update progress to ${{ steps.progress.outputs.done }}/${{ steps.progress.outputs.total }} (${{ steps.progress.outputs.percent }}%)"
            git push
            echo "✅ Pushed progress update"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Update issue labels
        if: github.event_name == 'issues'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Add phase label based on issue title
            if (issue.title.includes('[1.')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['phase-1', 'critical']
              });
            } else if (issue.title.includes('[2.')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['phase-2', 'high-priority']
              });
            }

      - name: Create summary
        run: |
          echo "### 📊 Roadmap Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total tasks:** ${{ steps.progress.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed:** ${{ steps.progress.outputs.done }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Progress:** ${{ steps.progress.outputs.percent }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View ROADMAP.md](../../ROADMAP.md)" >> $GITHUB_STEP_SUMMARY
