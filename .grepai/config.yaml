version: 1
embedder:
    provider: ollama
    model: nomic-embed-text-v2-moe
    endpoint: http://localhost:11434
    dimensions: 768
    parallelism: 0
store:
    backend: gob
chunking:
    size: 256
    overlap: 32
watch:
    debounce_ms: 500
search:
    boost:
        enabled: true
        penalties:
            - pattern: /tests/
              factor: 0.5
            - pattern: test_
              factor: 0.5
            - pattern: /mocks/
              factor: 0.4
            - pattern: /fixtures/
              factor: 0.4
            - pattern: .md
              factor: 0.6
            - pattern: /docs/
              factor: 0.6
            - pattern: /evaluation/
              factor: 0.3
            - pattern: /scripts/
              factor: 0.7
            - pattern: /docker/
              factor: 0.4
            - pattern: /k8s/
              factor: 0.4
        bonuses:
            - pattern: /src/
              factor: 1.15
            - pattern: /telegram_bot/
              factor: 1.1
            - pattern: /telegram_bot/services/
              factor: 1.2
            - pattern: /telegram_bot/agents/
              factor: 1.2
            - pattern: /src/ingestion/
              factor: 1.15
            - pattern: /src/retrieval/
              factor: 1.15
    hybrid:
        enabled: false
        k: 60
trace:
    mode: fast
    enabled_languages:
        - .py
    exclude_patterns:
        - 'test_*.py'
        - '*_test.py'
ignore:
    # VCS & tooling
    - .git
    - .grepai
    - .github
    - .idea
    - .vscode
    - .editorconfig

    # Python caches (533MB+ .mypy_cache alone)
    - __pycache__
    - .mypy_cache
    - .ruff_cache
    - .pytest_cache
    - .cache
    - .tox
    - htmlcov
    - .coverage
    - "*.egg-info"
    - "*.dist-info"

    # Virtual environments
    - .venv
    - venv
    - telegram_bot/.venv

    # Dependency locks (not code)
    - uv.lock
    - package-lock.json
    - "*.lock"

    # Data & user content (not code)
    - data
    - datasets
    - drive-sync
    - docs/documents
    - docs/processed
    - docs/test_data

    # Generated reports & logs
    - logs
    - reports
    - docs/reports
    - docs/artifacts
    - evaluation/reports
    - evaluation/data
    - mlruns
    - langfuse_logs

    # Test fixtures (noise for semantic search)
    - tests/data
    - tests/fixtures

    # Archive & legacy
    - legacy
    - docs/archive
    - "docs/archive_*"

    # Infrastructure (not app logic)
    - qdrant_storage
    - node_modules
    - k8s
    - deploy
    - docker/rclone
    - docker/monitoring
    - docker/postgres
    - docker/mlflow

    # Claude internal (machine-specific)
    - .claude
    - .signals
    - .planning

    # Root-level junk
    - coverage.json
    - coverage_report_final.txt
    - AUDIT_REPORT.md
    - TODO.md
    - DOCKER.md
    - CHANGELOG.md
    - AGENTS.md
    - "test_output_*.txt"
    - "test_coverage_*.txt"
    - "debug_*.py"
    - "verify_*.py"
    - ".test_durations"
    - "=*"

    # Media & binary
    - telegram_bot/static
    - "*.jpg"
    - "*.jpeg"
    - "*.png"
    - "*.gif"
    - "*.tar.gz"
    - "*.backup"
    - "*.session"
    - "*.mp3"
    - "*.wav"
    - "*.ogg"
    - "*.pdf"
    - "*.so"
    - "*.whl"
scanner:
    ignore:
        # Claude & orchestration (git-tracked but not app code)
        - ".claude/"
        - ".signals/"
        - ".planning/"
        - "AGENTS.md"
        - "CLAUDE.local.md"
        - "TODO.md"
        - "AUDIT_REPORT.md"
        - "DOCKER.md"
        - "CHANGELOG.md"

        # Docs (not app code)
        - "docs/plans/"
        - "docs/agent-rules/"
        - "docs/claude-skills/"
        - "docs/archive/"
        - "docs/archive_*/"
        - "docs/audits/"
        - "docs/continuous-claude-*"
        - "docs/llm-tldr-*"
        - "docs/*-audit*.md"
        - "docs/2026-*.md"

        # K8s infra (git-tracked)
        - "k8s/"

        # Root-level junk (oneshot scripts, debug artifacts)
        - "debug_*.py"
        - "verify_*.py"
        - "simple_index_test.py"
        - "test_output_*.txt"
        - "test_coverage_*.txt"
        - "coverage_report_*.txt"
        - "coverage.json"
        - ".test_durations"
        - "=*"

        # Config files (not code)
        - ".release-please-manifest.json"
        - "release-please-config.json"
        - "renovate.json"
        - ".mcp.json"
        - ".dockerignore"
        - ".editorconfig"

        # Minified
        - "*.min.js"
        - "*.min.css"
update:
    check_on_startup: false
