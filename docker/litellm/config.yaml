# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
# Image: ghcr.io/berriai/litellm:main-v1.81.3-stable

model_list:
  # Primary: gpt-oss-120b on Cerebras (3000 tok/s)
  # ALIAS: "gpt-4o-mini" is an internal alias — it does NOT call OpenAI.
  # The bot sends requests to "gpt-4o-mini" which LiteLLM routes to Cerebras.
  # See fallbacks below for the actual OpenAI fallback (gpt-4o-mini-openai).
  # merge_reasoning_content: gpt-oss-120b is a reasoning model that sends
  # tokens as delta.reasoning instead of delta.content — this flag merges them
  - model_name: gpt-4o-mini
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096
      merge_reasoning_content_in_choices: true

  # Standalone alias for benchmarking
  - model_name: gpt-oss-120b
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096
      merge_reasoning_content_in_choices: true

  # Fallback 1: Cerebras GLM 4.7 (бывшая primary)
  - model_name: gpt-4o-mini-cerebras-glm
    litellm_params:
      model: openai/zai-glm-4.7
      api_base: https://api.cerebras.ai/v1
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096
      merge_reasoning_content_in_choices: true

  # Fallback 2: Groq (fast, free tier)
  - model_name: gpt-4o-mini-fallback
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # Fallback 3: OpenAI (reliable)
  - model_name: gpt-4o-mini-openai
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Speech-to-text: Whisper via OpenAI
  - model_name: whisper
    litellm_params:
      model: whisper-1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: audio_transcription

# Production general settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  proxy_batch_write_at: 60
  disable_error_logs: true
  allow_requests_on_db_unavailable: true

# Automatic fallback on errors
router_settings:
  fallbacks:
    - gpt-4o-mini: [gpt-4o-mini-cerebras-glm, gpt-4o-mini-fallback, gpt-4o-mini-openai]
  retry_policy:
    retry_count: 2

# LiteLLM settings
litellm_settings:
  request_timeout: 600
  set_verbose: false
  json_logs: true

# Environment variables for Langfuse v3
environment_variables:
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
  LANGFUSE_HOST: os.environ/LANGFUSE_HOST
  LANGFUSE_OTEL_HOST: os.environ/LANGFUSE_OTEL_HOST
