# telegram_bot/config/services.yaml
services:
  passive_income:
    emoji: "💰"
    title: "Пассивный доход"
    callback_id: "svc:passive_income"
    crm_title: "Пассивный доход"
    phone_prompt: "Оставьте номер — менеджер рассчитает потенциальный доход от сдачи и расскажет об условиях управления"
    phone_success: "Спасибо! Менеджер перезвонит и подготовит расчёт доходности для вас"
    card_text: |
      💰 Пассивный доход — сдаём вашу недвижимость

      Мы берём на себя управление вашей недвижимостью:
      полный цикл от поиска арендаторов до обслуживания.

      Вы получаете стабильный доход без забот.

      ⭐ «Сдаём квартиру через FortNoks уже 2 года,
      доход стабильный» — Андрей, Одесса

  online_deals:
    emoji: "🌐"
    title: "Сделки онлайн"
    callback_id: "svc:online_deals"
    crm_title: "Онлайн-сделка"
    phone_prompt: "Оставьте номер — менеджер расскажет как оформить покупку дистанционно"
    phone_success: "Спасибо! Менеджер свяжется и расскажет все детали дистанционного оформления"
    card_text: |
      🌐 Дистанционное оформление сделки

      Покупайте не выходя из дома!
      25% наших сделок проходят полностью дистанционно.

      • Оформление по украинскому паспорту
      • Все виды оплат (Cash / Card / Bank transfer / Crypto)
      • Полное юридическое сопровождение

  vnzh:
    emoji: "📋"
    title: "ВНЖ и легализация"
    callback_id: "svc:vnzh"
    crm_title: "ВНЖ и легализация"
    phone_prompt: "Оставьте номер — менеджер проконсультирует по процессу получения ВНЖ и необходимым документам"
    phone_success: "Спасибо! Менеджер свяжется и проведёт консультацию по ВНЖ"
    card_text: |
      📋 ВНЖ и легализация в Болгарии

      Полное сопровождение с документами для получения
      вида на жительство в Болгарии.

      Помощь с оформлением, консультации на каждом этапе.

  installment:
    emoji: "💳"
    title: "Рассрочка"
    callback_id: "svc:installment"
    crm_title: "Рассрочка"
    phone_prompt: "Оставьте номер — менеджер подберёт варианты рассрочки под ваш бюджет и рассчитает график платежей"
    phone_success: "Спасибо! Менеджер свяжется с расчётом рассрочки под ваши условия"
    card_text: |
      💳 Гибкая рассрочка от застройщика

      Без банков и посредников!
      Для оформления нужен только паспорт.

      • Первый взнос — от 5%
      • Процентная ставка — 0%
      • Срок рассрочки — до 3 лет

      📊 Пример: квартира €50,000 →
      взнос €2,500 → €1,300/мес

      ⭐ «Оформили за 2 недели, нужен
      был только паспорт» — Елена, Киев

      ❓ Частые вопросы:
      • Какие документы нужны?
      • Можно ли оформить дистанционно?

  infotour:
    emoji: "✈️"
    title: "Инфотур"
    callback_id: "svc:infotour"
    crm_title: "Инфотур"
    phone_prompt: "Оставьте номер — менеджер подберёт удобные даты инфотура и расскажет про программу"
    phone_success: "Спасибо! Менеджер свяжется для бронирования инфотура"
    card_text: |
      ✈️ Инфотур «Недвижимость в Болгарии»

      До 15 июня акционная цена — всего 150 евро за семью.
      После покупки жилья мы вернём деньги за инфотур!

      Сейчас лучшее время совместить приятное с полезным —
      отдохнуть и выбрать недвижимость у моря.

      📑 Для покупки нужен только паспорт и желание жить
      у моря или инвестировать!

      ✅ Рассрочка за 1 день — без банков, без лишних
      документов — напрямую от крупнейшего застройщика
      Болгарии 🔆

      🏖 Локации: Солнечный Берег, Святой Влас, Елените,
      Несебр — лучшие курорты южного побережья!

      🏢 Объекты: 18 комплексов сданы, ещё 2 строятся.

      💰 Условия покупки:
      🔹 Первый взнос — от 10%
      🔹 Апартаменты от 38 900 евро
      🔹 Выгодные условия рассрочки

